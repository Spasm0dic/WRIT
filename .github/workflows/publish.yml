name: Publish to PyPI

on:
  push:
    tags:
      - "v*"   # triggers on v0.1.0, v1.0.0, etc.

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest --tb=short

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi          # matches the environment name you set up on PyPI
    permissions:
      id-token: write          # required for OIDC trusted publishing (no API token needed)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
